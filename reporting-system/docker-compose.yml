name: reporting-system

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: reporting-app
    ports:
      - "9006:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - solr
      - mysql
      - kafka
    networks:
      - reporting_net

  solr:
    image: solr:9
    container_name: reporting-solr
    ports:
      - "9007:8983"
    volumes:
      - reporting_solr_data:/var/solr
    command: solr-precreate reports
    networks:
      - reporting_net

  mysql:
    image: mysql:8
    container_name: reporting-mysql
    ports:
      - "9008:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: reporting
      MYSQL_USER: reporting_user
      MYSQL_PASSWORD: reporting_pass
    volumes:
      - reporting_mysql_data:/var/lib/mysql
    networks:
      - reporting_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: reporting-kafka
    ports:
      - "9009:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - reporting_net

networks:
  reporting_net:
    driver: bridge

volumes:
  reporting_solr_data:
  reporting_mysql_data: